prose:
  media: "media"
  ignore:
    - README.md
    - _prose.yml
  metadata:
    "":
      - name: "title"
        field:
          element: "text"
          label: "title"
      - name: "categories"
        field:
          element: "multiselect"
          label: "Add Categories"
          placeholder: "Add Categories"
          alterable: true
      - name: "tags"
        field:
          element: "multiselect"
          label: "Add Tags"
          placeholder: "Add Tags"
          alterable: true
      - name: "excerpt"
        field:
          element: "text"
          label: "Add Excerpt"
          placeholder: "Add Excerpt"
