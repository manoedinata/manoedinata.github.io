# Folder
media_folder: "public/assets/img/posts" # Location where files will be stored in the repo
public_folder: "/assets/img/posts" # The src attribute for uploaded media

# Authentication: Netlify Identity
backend:
  name: git-gateway
  branch: new

collections:
  - name: "posts" # Used in routes, e.g., /admin/collections/blog
    label: "Blog posts" # Used in the UI
    folder: "src/pages/posts" # The path to the folder where the documents are stored
    create: true # Allow users to create new documents in this collection
    fields: # The fields for each document, usually in frontmatter
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }
