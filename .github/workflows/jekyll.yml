# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Runs on a schedule (e.g., daily at 00:00 UTC)
  schedule:
    - cron: "0 0 * * *"

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Update submodule job
  update_submodule:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      submodule_updated: ${{ steps.update_submodule.outputs.submodule_updated }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false # Do not checkout submodules automatically
      - name: Checkout submodules
        run: |
          git submodule init
          git submodule update --remote --merge
          git -C _posts checkout posts
      - name: Check if submodule updated
        id: update_submodule
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git submodule update --remote --merge
          if git diff --submodule | grep -q '_posts'; then
            echo "submodule_updated=true" >> $GITHUB_ENV
            echo "::set-output name=submodule_updated::true"
            git commit -am "Update submodule"
            git push
          else
            echo "submodule_updated=false" >> $GITHUB_ENV
            echo "::set-output name=submodule_updated::false"
          fi

  # Build job
  build:
    runs-on: ubuntu-latest
    needs: update_submodule
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || needs.update_submodule.outputs.submodule_updated == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
      - name: Setup Ruby
        uses: ruby/setup-ruby@8575951200e472d5f2d95c625da0c7bec8217c42 # v1.161.0
        with:
          ruby-version: "3.1" # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
