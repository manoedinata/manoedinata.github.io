name: Sync Notion Content

on:
  # Run every 30 minutes
  schedule:
    - cron: "*/30 * * * *"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository (main)
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: notion2md/package-lock.json

      - name: Install dependencies
        run: cd notion2md && npm ci

      - name: Fetch Notion Posts
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          # Overwrite the site's blog content in place on the master branch.
          OUTPUT_DIR: ${{ github.workspace }}/content/blogs
        run: |
          # Start from a clean slate so removed Notion posts disappear too.
          rm -rf "$OUTPUT_DIR"
          cd notion2md && node notion2md.js

      - name: Commit synced content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blogs
          if git diff --cached --quiet; then
            echo "No content changes to commit."
          else
            git commit -m "feat: sync content from notion"
            git push
          fi
